<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İleriHAT | HAT30 Projesi</title>

  <style>
    /* MODERN TASARIM AYARLARI */
    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --bg: #0f0c29;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      margin: 0;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* SOL ÜST MENÜ */
    .nav-auth {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      gap: 15px;
    }

    .auth-btn {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .auth-btn:hover {
      background: var(--primary);
      box-shadow: 0 0 20px var(--primary);
      transform: translateY(-3px);
    }

    /* ANA KONTEYNER */
    .container {
      max-width: 900px;
      margin: 100px auto;
      padding: 20px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 25px;
      margin-bottom: 50px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    /* HAT30 ÖZEL KUTU STİLİ */
    #coming-soon {
      border: 2px solid var(--primary);
      background: rgba(0, 210, 255, 0.05);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4);
      }

      70% {
        box-shadow: 0 0 0 20px rgba(0, 210, 255, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(0, 210, 255, 0);
      }
    }

    h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-top: 10px;
    }

    h2 {
      letter-spacing: 5px;
      color: #fff;
    }

    p {
      line-height: 1.6;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* MODAL TASARIMI */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #1a1a2e;
      width: 320px;
      margin: 10% auto;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--primary);
      text-align: center;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 25px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f0c29;
      color: white;
      box-sizing: border-box;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="nav-auth">
    <button class="auth-btn" onclick="toggleModal('login')">LOG IN</button>
    <button class="auth-btn" onclick="toggleModal('signup')" style="background: var(--primary);">SIGN UP</button>
  </div>

  <div class="container">
    <section class="card" id="coming-soon">
      <h2 style="margin:0;">⚠️ HAT30 ÇOK YAKINDA</h2>
      <p>Yerli Drone Çipimiz yakında hizmete sunulacaktır. Takipte kalın!</p>
    </section>

    <section class="card" id="mission">
      <h3 style="color: var(--primary); letter-spacing: 2px; margin-bottom: 0;">İleriHAT- HAT30</h3>
      <h1>🚀 Misyonumuz</h1>
      <p>Yerli ve Milli Drone Çipimizle Eğlenceyi Başka Bir Hata Taşımak.</p>
    </section>

    <section class="card" id="contact">
      <h2>📱 İletişim</h2>
      <p>E-posta: adilerkamtek2011@gmail.com</p>
      <p>Konum: HATAY, Türkiye</p>
    </section>
  </div>

  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle">Kayıt Ol</h2>
      <input type="email" id="email" placeholder="E-posta">
      <input type="password" id="password" placeholder="Şifre (Min 6 Karakter)">
      <button class="submit-btn" id="mainActionBtn">Devam Et</button>
      <p id="msg" style="font-size: 12px; margin-top: 10px;"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwOgPy54D0tyUzMrSkANGC5h4veQUkETM",
      authDomain: "tanitim-sitesi.firebaseapp.com",
      projectId: "tanitim-sitesi",
      storageBucket: "tanitim-sitesi.firebasestorage.app",
      messagingSenderId: "615084312824",
      appId: "1:615084312824:web:f07b192dc33dcee02d530d",
      measurementId: "G-8BFXS8HZ03"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const modal = document.getElementById('authModal');
    const modalTitle = document.getElementById('modalTitle');
    const actionBtn = document.getElementById('mainActionBtn');
    const msg = document.getElementById('msg');

    window.toggleModal = function (mode) {
      modal.style.display = "block";
      msg.innerText = "";
      if (mode === 'login') {
        modalTitle.innerText = "Giriş Yap";
        actionBtn.innerText = "Giriş Yap";
        actionBtn.onclick = () => handleAuth('login');
      } else {
        modalTitle.innerText = "Yeni Kayıt";
        actionBtn.innerText = "Kayıt Ol";
        actionBtn.onclick = () => handleAuth('signup');
      }
    }

    window.closeModal = function () { modal.style.display = "none"; }

    async function handleAuth(mode) {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      try {
        if (mode === 'signup') {
          await createUserWithEmailAndPassword(auth, email, pass);
        } else {
          await signInWithEmailAndPassword(auth, email, pass);
        }
        // GİRİŞ BAŞARILIYSA DİĞER SAYFAYA GİT
        window.location.href = "dashboard.html";
      } catch (error) {
        msg.style.color = "red";
        msg.innerText = "Hata: " + error.message;
      }
    }
  </script>
</body>

</html>
