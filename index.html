<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // Senin Firebase bilgilerini buraya yerleştirdim
  const firebaseConfig = {
    apiKey: "AIzaSyCwOgPy54D0tyUzMrSkANGC5h4veQUkETM",
    authDomain: "tanitim-sitesi.firebaseapp.com",
    projectId: "tanitim-sitesi",
    storageBucket: "tanitim-sitesi.firebasestorage.app",
    messagingSenderId: "615084312824",
    appId: "1:615084312824:web:f07b192dc33dcee02d530d",
    measurementId: "G-8BFXS8HZ03"
  };

  // Firebase'i başlat
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Butonlara ve kutucuklara erişelim
  const emailInput = document.querySelector('input[type="email"]');
  const passwordInput = document.querySelector('input[type="password"]');
  const loginBtn = document.querySelector('.btn'); // Giriş Yap butonu

  // KAYIT OL FONKSİYONU
  // (Senin HTML'inde şimdilik sadece "Kayıt Ol" linki vardı, 
  // gel onu şimdilik Giriş butonuna bağlayalım veya yeni bir buton ekleyelim)

  loginBtn.addEventListener('click', () => {
    const email = emailInput.value;
    const password = passwordInput.value;

    if (email === "" || password === "") {
      alert("Lütfen tüm alanları doldur!");
      return;
    }

    // Kullanıcıyı Firebase'e kaydet
    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("Başarıyla kayıt oldun! Hoş geldin.");
      })
      .catch((error) => {
        alert("Hata oluştu: " + error.message);
      });
  });
</script>
