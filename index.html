<script type="module">
  // Firebase kütüphanelerini internetten çekiyoruz
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // Senin Firebase Proje Bilgilerin
  const firebaseConfig = {
    apiKey: "AIzaSyCwOgPy54D0tyUzMrSkANGC5h4veQUkETM",
    authDomain: "tanitim-sitesi.firebaseapp.com",
    projectId: "tanitim-sitesi",
    storageBucket: "tanitim-sitesi.firebasestorage.app",
    messagingSenderId: "615084312824",
    appId: "1:615084312824:web:f07b192dc33dcee02d530d",
    measurementId: "G-8BFXS8HZ03"
  };

  // Firebase'i çalıştır
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Sayfadaki kutucukları ve butonu JavaScript'e tanıtıyoruz
  // Not: HTML'de inputların tipinin 'email' ve 'password' olduğundan emin ol!
  const emailInput = document.querySelector('input[type="email"]');
  const passwordInput = document.querySelector('input[type="password"]');
  const loginBtn = document.getElementById('login-btn');

  // Butona basıldığında ne olacağını söylüyoruz
  if (loginBtn) {
    loginBtn.addEventListener('click', (e) => {
      e.preventDefault(); // Sayfanın kendi kendine yenilenmesini durdurur

      const email = emailInput.value;
      const password = passwordInput.value;

      if (email === "" || password.length < 6) {
        alert("Lütfen geçerli bir e-posta girin ve şifreniz en az 6 karakter olsun!");
        return;
      }

      // Firebase'e kullanıcıyı gönderiyoruz
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Tebrikler Adil! Başarıyla kayıt oldun.");
          console.log("Kayıt başarılı:", userCredential.user);
        })
        .catch((error) => {
          alert("Hata oluştu: " + error.message);
          console.error("Firebase Hatası:", error.code);
        });
    });
  } else {
    console.error("HATA: 'login-btn' ID'li buton sayfada bulunamadı!");
  }
</script>
